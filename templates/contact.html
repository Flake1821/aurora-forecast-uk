{% extends 'base.html' %}
{% block title %}Contact — UK Aurora & Night Sky{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-header text-center">
            <h2>Get in Touch</h2>
            <p>Have a question or want to get involved?</p>
        </div>
        <div class="glass-card text-center">
            <div class="mb-4">
                <i class="bi bi-envelope" style="font-size: 2.5rem; color: var(--aurora-green);"></i>
                <h5 class="mt-2 mb-1">Email</h5>
                <a href="mailto:jeremytuckerphotography@gmail.com">jeremytuckerphotography@gmail.com</a>
            </div>
            <hr style="border-color: var(--night-border);">
            <div class="mb-0">
                <i class="bi bi-facebook" style="font-size: 2.5rem; color: var(--aurora-blue);"></i>
                <h5 class="mt-2 mb-1">Facebook</h5>
                <a href="https://www.facebook.com/CornwallNightSkyAlerts/" target="_blank" rel="noopener">
                    UK Aurora & Night Sky Alerts
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
