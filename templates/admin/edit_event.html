{% extends 'base.html' %}
{% block title %}{{ 'Edit' if event else 'New' }} Event — Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-calendar-event me-2"></i>{{ 'Edit' if event else 'New' }} Event</h2>
            <a href="{{ url_for('admin.events') }}" class="btn btn-sm btn-aurora-outline">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <div class="glass-card">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-control bg-dark text-white border-secondary"
                           value="{{ event.title if event else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control bg-dark text-white border-secondary"
                              rows="4">{{ event.description if event else '' }}</textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Start Date & Time *</label>
                        <input type="datetime-local" name="event_date" class="form-control bg-dark text-white border-secondary"
                               value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') if event and event.event_date else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">End Date & Time</label>
                        <input type="datetime-local" name="end_date" class="form-control bg-dark text-white border-secondary"
                               value="{{ event.end_date.strftime('%Y-%m-%dT%H:%M') if event and event.end_date else '' }}">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control bg-dark text-white border-secondary"
                               value="{{ event.location if event else '' }}" placeholder="e.g. Kielder, Northumberland">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Event Type</label>
                        <select name="event_type" class="form-select bg-dark text-white border-secondary">
                            {% for t in ['workshop', 'meetup', 'astronomical_event', 'exhibition', 'other'] %}
                            <option value="{{ t }}" {% if event and event.event_type == t %}selected{% endif %}>
                                {{ t|replace('_', ' ')|capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Price</label>
                        <input type="text" name="price" class="form-control bg-dark text-white border-secondary"
                               value="{{ event.price if event else '' }}" placeholder="e.g. Free, or &pound;45">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Booking URL</label>
                        <input type="url" name="booking_url" class="form-control bg-dark text-white border-secondary"
                               value="{{ event.booking_url if event else '' }}" placeholder="https://...">
                    </div>
                </div>
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" name="is_published" value="1"
                               id="published" {% if not event or event.is_published %}checked{% endif %}>
                        <label class="form-check-label" for="published">Published</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-aurora">
                    {{ 'Save Changes' if event else 'Create Event' }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
